startCommand:
  type: http
  url: https://faxseal-mcp.up.railway.app/mcp
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: Your FaxSeal API key (fsx_...). Generate one at https://faxseal.com/dashboard/api-tokens
  exampleConfig:
    apiKey: fsx_your_token_here
